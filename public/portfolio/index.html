<script>
const view = document.getElementById('view');
function esc(s = '') { return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }

async function loadList() {
  try {
    const r = await fetch('/api/portfolio');
    const { projects } = await r.json();
    if (!projects || !projects.length) {
      view.innerHTML = '<div class="empty">No projects yet.</div>';
      return;
    }
    view.innerHTML = '<div class="project-list">' + projects.map((p) => `
      <article class="project-card fade-in visible">
        <div class="head">
          <h2>${esc(p.title)}</h2>
          <span class="year">${esc(p.year || '')}</span>
        </div>
        <p class="summary">${esc(p.summary || '')}</p>
        ${p.role ? `<p class="role">Role: ${esc(p.role)}</p>` : ''}
        ${p.highlights && p.highlights.length ? `<ul>${p.highlights.map((h) => `<li>${esc(h)}</li>`).join('')}</ul>` : ''}
        ${p.stack && p.stack.length ? `<div class="stack">${p.stack.map((s) => `<span>${esc(s)}</span>`).join('')}</div>` : ''}
      </article>
    `).join('') + '</div>';
  } catch (err) {
    view.innerHTML = '<div class="empty">Could not load projects.</div>';
  }
}
loadList();
</script>
<script src="/assets/main.js"></script>
