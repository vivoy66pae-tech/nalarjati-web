<script>
const view = document.getElementById('view');

function escapeHtml(s = '') {
  return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

async function loadList() {
  view.innerHTML = '<div class="empty">Loading…</div>';
  try {
    const r = await fetch('/api/posts');
    const { posts } = await r.json();
    if (!posts || !posts.length) {
      view.innerHTML = '<div class="empty">No posts yet.</div>';
      return;
    }
    view.innerHTML = '<div class="post-list">' + posts.map((p) => `
      <a class="post-card" href="/blog/${escapeHtml(p.slug)}">
        <div class="date">${escapeHtml((p.date || '').slice(0, 10))}</div>
        <h2>${escapeHtml(p.title)}</h2>
        <p>${escapeHtml(p.excerpt)}</p>
        ${p.tags && p.tags.length ? `<div class="tags">${p.tags.map((t) => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
      </a>
    `).join('') + '</div>';
  } catch (err) {
    view.innerHTML = '<div class="empty">Could not load posts.</div>';
  }
}

async function loadPost(slug) {
  view.innerHTML = '<div class="empty">Loading…</div>';
  try {
    const r = await fetch('/api/posts/' + encodeURIComponent(slug));
    if (!r.ok) return loadList();
    const p = await r.json();
    document.title = `${p.title} — nalarjati.dev`;
    view.innerHTML = `
      <article class="post-content fade-in visible">
        <a class="back-link" href="/blog">← All posts</a>
        <h1>${escapeHtml(p.title)}</h1>
        <div class="meta">${escapeHtml(p.date || '')} · ${escapeHtml(p.author || '')}</div>
        <div class="body">${p.html}</div>
      </article>
    `;
  } catch (err) {
    view.innerHTML = '<div class="empty">Could not load post.</div>';
  }
}

// SPA routing
const path = location.pathname.replace(/\/+$/, '');
const m = path.match(/^\/blog\/([^/]+)$/);
if (m) loadPost(m[1]); else loadList();
</script>
